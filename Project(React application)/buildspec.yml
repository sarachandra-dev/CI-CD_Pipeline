version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - cd frontend && npm ci
      - cd ../backend && npm ci

  pre_build:
    commands:
      - node -v
      - npm -v

  build:
    commands:
      - cd frontend && npm run build

  post_build:
    commands:
      - echo "Deploying frontend to S3..."
      - aws s3 sync frontend/dist s3://$S3_BUCKET --delete
      - echo "Deploy complete."

artifacts:
  files:
    - 'frontend/dist/**/*'
    - 'backend/**/*'
  discard-paths: no

cache:
  paths:
    - '/root/.npm/**/*'
